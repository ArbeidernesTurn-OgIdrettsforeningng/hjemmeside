<!DOCTYPE html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ATIF - Kontakt oss</title>
    <link rel="stylesheet" href="../../styles.css" />
    <link rel="icon" type="image/x-icon" href="/images/icon/favicon.ico?v=3">
    <link rel="icon" type="image/png" href="/images/icon/favicon-16.png?v=3">
    <link rel="shortcut icon" href="/images/icon/favicon.ico?v=3">
    <link rel="apple-touch-icon" href="/images/icon/favicon.png?v=3">
  </head>
  <body style="background-color: #ecf2ff">
    <div id="navbar">
    </div>
    
    <div class="py-8">
      <div class="container mx-auto px-4 max-w-7xl">
        <h1 class="text-3xl font-bold text-gray-800 mb-8 text-center">
          Kontakt oss
        </h1>
        
        <!-- Kontaktinformasjon (topp) -->
        <div class="flex justify-center mb-6">
          <div class="border-2 rounded-xl bg-white p-6 shadow-lg max-w-md" style="border-color: #1D2092;">
            <h2 class="text-xl font-semibold mb-4 text-gray-800">Kontaktinformasjon</h2>
            <div class="space-y-3">
              <div class="flex items-start">
                <svg class="w-4 h-5 text-gray-600 mt-1 mr-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
                <div>
                  <p class="font-semibold text-gray-800">Adresse</p>
                  <p class="text-gray-600">Rosenborghallen</p>
                </div>
              </div>
              <div class="flex items-start">
                <svg class="w-5 h-5 text-gray-600 mt-1 mr-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 4.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                </svg>
                <div>
                  <p class="font-semibold text-gray-800">E-post</p>
                  <p class="text-gray-600">atifturn@gmail.com</p>
                </div>
              </div>
            </div>
          </div>
        </div>
        
        <!-- Send oss en melding skjema -->
        <div class="border-2 rounded-xl bg-white p-6 shadow-lg" style="border-color: #1D2092;">
          <h2 class="text-xl font-semibold mb-4 text-gray-800">Send oss en melding</h2>
          <div id="form-message" class="hidden mb-4 p-4 rounded-lg"></div>
          <form id="contact-form" class="space-y-4">
              <div>
                <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Navn *</label>
                <input type="text" id="name" name="name" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
              </div>
            <div>
              <label for="subject" class="block text-sm font-medium text-gray-700 mb-1">Emne *</label>
              <input type="text" id="subject" name="subject" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            </div>
            <div>
              <label for="message" class="block text-sm font-medium text-gray-700 mb-1">Melding *</label>
              <textarea id="message" name="message" rows="4" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"></textarea>
            </div>
            <button type="submit" id="submit-btn" class="w-full py-2 px-4 rounded-lg font-semibold transition-colors duration-200" style="background-color: #1D2092; color: white;" onmouseover="this.style.backgroundColor='#161a75'" onmouseout="this.style.backgroundColor='#1D2092'">Send melding</button>
          </form>
        </div>
      </div>
    </div>
    
    <div id="footer">
    </div>
    
    <script src="/script.js"></script>
    <script>
      // Handle form submission with mailto: (no third-party service)
      const contactForm = document.getElementById('contact-form');
      if (contactForm) {
        contactForm.addEventListener('submit', function(e) {
          e.preventDefault();
          
          const name = document.getElementById('name').value;
          const subject = document.getElementById('subject').value;
          const message = document.getElementById('message').value;
          
          // Create mailto link with pre-filled content
          const emailBody = `

${message}

Med vennlig hilsen,
${name}`;
          
          // Encode the email content for URL
          const encodedSubject = encodeURIComponent(subject);
          const encodedBody = encodeURIComponent(emailBody);
          
          // Create mailto link
          const mailtoLink = `mailto:atifturn@gmail.com?subject=${encodedSubject}&body=${encodedBody}`;
          
          // Open email client
          window.location.href = mailtoLink;
          
          // Show success message
          const messageDiv = document.getElementById('form-message');
          messageDiv.className = 'mb-4 p-4 rounded-lg bg-green-100 border border-green-400 text-green-700';
          messageDiv.textContent = 'E-postklienten din vil åpne seg. Hvis ikke, sjekk at du har en e-postklient satt opp.';
          messageDiv.classList.remove('hidden');
          
          // Reset form after a short delay
          setTimeout(function() {
            contactForm.reset();
          }, 1000);
        });
      }
    </script>
  </body>
</html>
