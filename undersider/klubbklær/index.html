<!DOCTYPE html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Klubbklær - ATIF</title>
    <link rel="stylesheet" href="../../styles.css" />
    <link rel="icon" type="image/x-icon" href="/images/icon/favicon.ico?v=3">
    <link rel="icon" type="image/png" href="/images/icon/favicon-16.png?v=3">
    <link rel="shortcut icon" href="/images/icon/favicon.ico?v=3">
    <link rel="apple-touch-icon" href="/images/icon/favicon.png?v=3">
  </head>
  <body style="background-color: #ecf2ff">
    <div id="navbar">
    </div>
    

    <div class="min-h-screen">
      <div class="container mx-auto px-4 py-8 max-w-7xl">
        <h1 class="text-3xl font-bold text-gray-800 mb-6 text-center">
          Klubbklær
        </h1>
          
        <div class="lg:flex lg:gap-8 lg:items-stretch">
          <!-- Left column: Text content box -->
          <div class="lg:w-1/2 mb-8 lg:mb-0 ">
            <div class="bg-white rounded-lg shadow-lg p-8 space-y-6 text-gray-700 h-full">
              <div class="space-y-4 pb-8">
                <h2 class="text-xl font-semibold text-gray-800">Klubbkolleksjon</h2>
                <p>
                Klubbklær er tilgjengelig for kjøp hos Intersport Lefstad i Munkegata. 
                Klubbens logo og evnetuelle intialer/ navn kan trykkes på i butikken mens du venter, bare oppgi klubbnavn.
                Vi gjør oppmerksom på at kjøp av klubbklær gjøres frivillig. 
                </p>  
              </div>
                <img src="/images/div/turn7-crop.jpeg" alt="Medlemssystem" class="w-full h-auto object-contain rounded-lg">
            </div>
          </div>
          <!-- Bildekarusell til høyre-->
          <div class="lg:w-1/2">
            <div class="bg-white rounded-lg shadow-lg p-6 h-full flex flex-col">
              <div class="mt-8">
               <div class="relative">
                  <div id="klubbklaer-carousel" class="overflow-hidden rounded-lg" style="max-height: 70vh;">
                   <div class="flex transition-transform duration-500 ease-in-out" id="klubbklaer-carousel-track" style="transform: translateX(0%);">
                    <!-- Slide 1 -->
                    <div class="min-w-full flex-shrink-0">
                      <img src="/images/div/ATIF Turn - Klubbkolleksjon1.png" alt="Klubbkolleksjon 1" class="w-full h-auto object-contain" style="max-height: 70vh;">
                    </div>
                    <!-- Slide 2 -->
                    <div class="min-w-full flex-shrink-0">
                      <img src="/images/div/ATIF Turn - Klubbkolleksjon2.png" alt="Klubbkolleksjon 2" class="w-full h-auto object-contain" style="max-height: 70vh;">
                    </div>
                    <!-- Slide 3 -->
                    <div class="min-w-full flex-shrink-0">
                      <img src="/images/div/ATIF Turn - Klubbkolleksjon3.png" alt="Klubbkolleksjon 3" class="w-full h-auto object-contain" style="max-height: 70vh;">
                    </div>
                    <!-- Slide 4 -->
                    <div class="min-w-full flex-shrink-0">
                      <img src="/images/div/ATIF Turn - Klubbkolleksjon4.png" alt="Klubbkolleksjon 4" class="w-full h-auto object-contain" style="max-height: 70vh;">
                    </div>
                  </div>
                </div>
                <!-- Navigasjonsknapper -->
                <button id="klubbklaer-prev-btn" class="absolute left-0 top-1/2 transform -translate-y-1/2 -translate-x-1/2 bg-black bg-opacity-50 text-white p-2 rounded-full hover:bg-opacity-75 transition-opacity z-10" aria-label="Forrige">
                  <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                  </svg>
                </button>
                <button id="klubbklaer-next-btn" class="absolute right-0 top-1/2 transform -translate-y-1/2 translate-x-1/2 bg-black bg-opacity-50 text-white p-2 rounded-full hover:bg-opacity-75 transition-opacity z-10" aria-label="Neste">
                  <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                  </svg>
                </button>
                <!-- Indikatorer -->
                <div class="flex justify-center mt-4 space-x-2" id="klubbklaer-carousel-indicators">
                  <button class="w-3 h-3 rounded-full bg-blue-600 hover:bg-blue-700 transition-colors cursor-pointer" data-slide="0" aria-label="Slide 1"></button>
                  <button class="w-3 h-3 rounded-full bg-gray-400 hover:bg-gray-500 transition-colors cursor-pointer" data-slide="1" aria-label="Slide 2"></button>
                  <button class="w-3 h-3 rounded-full bg-gray-400 hover:bg-gray-500 transition-colors cursor-pointer" data-slide="2" aria-label="Slide 3"></button>
                  <button class="w-3 h-3 rounded-full bg-gray-400 hover:bg-gray-500 transition-colors cursor-pointer" data-slide="3" aria-label="Slide 4"></button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
        




            <!-- Bildekarusell -->
    
    <div id="footer">
    </div>
    
    <script src="/script.js"></script>
  </body>
</html>
