<!DOCTYPE html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ATIF - Kontakt oss</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <div id="navbar">
    </div>
    
    <div class="bg-gray-50 min-h-screen py-8">
      <div class="container mx-auto px-4 max-w-4xl">
        <h1 class="text-3xl font-bold text-gray-800 mb-8 text-center">
          Kontakt oss
        </h1>
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
          <div class="border-2 rounded-xl bg-white p-6 shadow-lg" style="border-color: #1D2092;">
            <h2 class="text-xl font-semibold mb-4 text-gray-800">Kontaktinformasjon</h2>
            <div class="space-y-3">
              <div class="flex items-start">
                <svg class="w-5 h-5 text-gray-600 mt-1 mr-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
                <div>
                  <p class="font-semibold text-gray-800">Adresse</p>
                  <p class="text-gray-600">Hallen vår ligger i sentrum av byen</p>
                </div>
              </div>
              <div class="flex items-start">
                <svg class="w-5 h-5 text-gray-600 mt-1 mr-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path>
                </svg>
                <div>
                  <p class="font-semibold text-gray-800">Telefon</p>
                  <p class="text-gray-600">+47 123 45 678</p>
                </div>
              </div>
              <div class="flex items-start">
                <svg class="w-5 h-5 text-gray-600 mt-1 mr-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 4.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                </svg>
                <div>
                  <p class="font-semibold text-gray-800">E-post</p>
                  <p class="text-gray-600">info@atif.no</p>
                </div>
              </div>
            </div>
          </div>
          
          <div class="border-2 rounded-xl bg-white p-6 shadow-lg" style="border-color: #1D2092;">
            <h2 class="text-xl font-semibold mb-4 text-gray-800">Åpningstider</h2>
            <div class="space-y-2">
              <div class="flex justify-between">
                <span class="text-gray-600">Mandag - Fredag</span>
                <span class="font-semibold text-gray-800">08:00 - 22:00</span>
              </div>
              <div class="flex justify-between">
                <span class="text-gray-600">Lørdag</span>
                <span class="font-semibold text-gray-800">09:00 - 18:00</span>
              </div>
              <div class="flex justify-between">
                <span class="text-gray-600">Søndag</span>
                <span class="font-semibold text-gray-800">10:00 - 16:00</span>
              </div>
            </div>
          </div>
        </div>
        
        <div class="border-2 rounded-xl bg-white p-6 shadow-lg" style="border-color: #1D2092;">
          <h2 class="text-xl font-semibold mb-4 text-gray-800">Send oss en melding</h2>
          <form class="space-y-4">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div>
                <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Navn *</label>
                <input type="text" id="name" name="name" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
              </div>
              <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">E-post *</label>
                <input type="email" id="email" name="email" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
              </div>
            </div>
            <div>
              <label for="subject" class="block text-sm font-medium text-gray-700 mb-1">Emne</label>
              <input type="text" id="subject" name="subject" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            </div>
            <div>
              <label for="message" class="block text-sm font-medium text-gray-700 mb-1">Melding *</label>
              <textarea id="message" name="message" rows="4" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"></textarea>
            </div>
            <button type="submit" class="w-full py-2 px-4 rounded-lg font-semibold transition-colors duration-200" style="background-color: #1D2092; color: white;" onmouseover="this.style.backgroundColor='#161a75'" onmouseout="this.style.backgroundColor='#1D2092'">Send melding</button>
          </form>
        </div>
      </div>
    </div>
    
    <div id="footer">
    </div>
    
    <script src="/script.js"></script>
  </body>
</html>
